<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎨 Air Canvas — Gesture Control Hub</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
<div class="project-page">

  <div class="project-header">
    <button class="back-btn" onclick="stopAndBack()">← Back to Dashboard</button>
    <h1 class="project-title">🎨 Air Canvas</h1>
    <button class="btn btn-stop" id="stopBtn" onclick="stopProject()" style="display:none">■ Stop</button>
  </div>

  <div class="project-content">

    <!-- Camera feed -->
    <div>
      <div class="camera-container" id="cameraBox">
        <div class="camera-placeholder" id="placeholder">
          <span style="font-size:3rem">🎨</span>
          <span>Click START to activate camera</span>
        </div>
        <img id="feed" src="" alt="Camera feed" style="display:none" />
      </div>

      <div class="btn-row mt-2">
        <button class="btn btn-start" id="startBtn" onclick="startProject()">▶ Start</button>
        <button class="btn btn-stop" id="stopBtn2" onclick="stopProject()" style="display:none">■ Stop</button>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="panel">
        <h3 style="color:var(--accent-2)">Status</h3>
        <div class="status-box" id="statusBox">Waiting to start…</div>
        <div class="mt-1" style="font-size:.85rem;color:var(--text-muted)">
          Color: <span id="colorName" style="font-weight:600;color:#fff">—</span>
        </div>
      </div>

      <div class="panel">
        <h3 style="color:var(--accent-2)">Gesture Guide</h3>
        <ul class="instructions-list">
          <li><span class="icon">☝️</span><span>Index finger only → Draw</span></li>
          <li><span class="icon">🖐️</span><span>All fingers up → Pause drawing</span></li>
          <li><span class="icon">✊</span><span>Fist → Clear canvas</span></li>
          <li><span class="icon">✌️</span><span>Peace sign → Red</span></li>
          <li><span class="icon">👍</span><span>Thumbs up → Blue</span></li>
          <li><span class="icon">🖖</span><span>Ring + Pinky → Green</span></li>
          <li><span class="icon">🤙</span><span>Pinky only → Yellow</span></li>
        </ul>
      </div>
    </div>

  </div>
</div>

<script src="{{ url_for('static', filename='js/air_canvas.js') }}"></script>
</body>
</html>
